$kind: graphql-request
name: Delete Classes
url: '{{baseUrl}}/graphql'
order: 4000
query: |-
  mutation DeleteClasses($classesIds: [Int!]!) {
    deleteClasses(classesIds: $classesIds)
  }
variables: '{"classesIds": [1, 2]}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.deleteClasses is a boolean', function () {
        const json = pm.response.json();
        pm.expect(json.data.deleteClasses).to.be.a('boolean');
      });
