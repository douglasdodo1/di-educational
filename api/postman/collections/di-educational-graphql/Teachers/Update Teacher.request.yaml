$kind: graphql-request
name: Update Teacher
url: '{{baseUrl}}/graphql'
order: 4000
query: |-
  mutation UpdateTeacher($id: Int!, $data: UpdateTeacherInput!) {
    updateTeacher(id: $id, data: $data) {
      id
      salary
      user {
        id
        email
        first_name
        last_name
      }
    }
  }
variables: |-
  {
    "id": 1,
    "data": {
      "id": 1,
      "salary": 6000.00,
      "first_name": "John Updated"
    }
  }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.updateTeacher has id and updated salary', function () {
        const json = pm.response.json();
        const teacher = json.data.updateTeacher;
        pm.expect(teacher).to.have.property('id');
        pm.expect(teacher).to.have.property('salary');
      });
