$kind: graphql-request
name: Get All Teachers
url: '{{baseUrl}}/graphql'
order: 1000
query: |-
  query GetAllTeachers {
    teachers {
      id
      salary
      user {
        id
        email
        first_name
        last_name
      }
    }
  }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.teachers is an array', function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property('teachers');
        pm.expect(json.data.teachers).to.be.an('array');
      });

      pm.test('Each teacher has id, salary, and user', function () {
        const json = pm.response.json();
        json.data.teachers.forEach(function (teacher) {
          pm.expect(teacher).to.have.property('id');
          pm.expect(teacher.id).to.be.a('number');
          pm.expect(teacher).to.have.property('salary');
          pm.expect(teacher.salary).to.be.a('number');
          pm.expect(teacher).to.have.property('user');
          pm.expect(teacher.user).to.be.an('object');
          pm.expect(teacher.user).to.have.property('email');
          pm.expect(teacher.user).to.have.property('first_name');
          pm.expect(teacher.user).to.have.property('last_name');
        });
      });
