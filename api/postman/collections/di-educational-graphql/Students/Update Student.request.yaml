$kind: graphql-request
name: Update Student
url: '{{baseUrl}}/graphql'
order: 4000
query: |-
  mutation UpdateStudent($id: Int!, $data: UpdateStudentInput!) {
    updateStudent(id: $id, data: $data)
  }
variables: |-
  {
    "id": 1,
    "data": {
      "id": 1,
      "first_name": "Jane Updated",
      "bio": "Updated bio"
    }
  }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.updateStudent is a boolean true', function () {
        const json = pm.response.json();
        pm.expect(json.data.updateStudent).to.be.a('boolean');
        pm.expect(json.data.updateStudent).to.equal(true);
      });
