$kind: graphql-request
name: Get Student by ID
url: '{{baseUrl}}/graphql'
order: 2000
query: |-
  query GetStudent($id: Int!) {
    student(id: $id) {
      enrollmentNumber
      user {
        id
        email
        first_name
        last_name
        bio
        avatarUrl
        phones {
          id
          number
        }
      }
    }
  }
variables: '{"id": 1}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.student is an object with enrollmentNumber and user', function () {
        const json = pm.response.json();
        const student = json.data.student;
        pm.expect(student).to.be.an('object');
        pm.expect(student).to.have.property('enrollmentNumber');
        pm.expect(student.enrollmentNumber).to.be.a('string');
        pm.expect(student).to.have.property('user');
        pm.expect(student.user).to.be.an('object');
      });

      pm.test('data.student.user has required fields', function () {
        const json = pm.response.json();
        const user = json.data.student.user;
        pm.expect(user).to.have.property('id');
        pm.expect(user).to.have.property('email');
        pm.expect(user).to.have.property('first_name');
        pm.expect(user).to.have.property('last_name');
      });
