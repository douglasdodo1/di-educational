$kind: graphql-request
name: Unrollment Students
url: '{{baseUrl}}/graphql'
order: 8000
query: |-
  mutation UnrollmentStudents($courseId: Int!, $ids: [Int!]!) {
    unrollmentStudents(courseId: $courseId, ids: $ids)
  }
variables: '{"courseId": 1, "ids": [1, 2]}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.unrollmentStudents is a boolean', function () {
        const json = pm.response.json();
        pm.expect(json.data.unrollmentStudents).to.be.a('boolean');
      });
