$kind: graphql-request
name: Get All Courses
url: '{{baseUrl}}/graphql'
order: 1000
query: |-
  query GetCourses {
    Courses {
      id
      name
      imageUrl
      description
      is_active
      start_date
      end_date
      teacher {
        id
        salary
        user {
          id
          email
          first_name
          last_name
        }
      }
      members {
        id
        email
        first_name
        last_name
      }
      classes {
        id
        name
        description
      }
    }
  }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.Courses is an array', function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property('Courses');
        pm.expect(json.data.Courses).to.be.an('array');
      });

      pm.test('Each course has required fields', function () {
        const json = pm.response.json();
        json.data.Courses.forEach(function (course) {
          pm.expect(course).to.have.property('id');
          pm.expect(course.id).to.be.a('number');
          pm.expect(course).to.have.property('name');
          pm.expect(course.name).to.be.a('string');
          pm.expect(course).to.have.property('is_active');
          pm.expect(course.is_active).to.be.a('boolean');
          pm.expect(course).to.have.property('start_date');
          pm.expect(course).to.have.property('end_date');
        });
      });
