$kind: graphql-request
name: Update Is Active
url: '{{baseUrl}}/graphql'
order: 6000
query: |-
  mutation UpdateIsActive($courseId: Int!, $state: Boolean!) {
    updateIsActive(courseId: $courseId, state: $state)
  }
variables: '{"courseId": 1, "state": false}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has no GraphQL errors', function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property('errors');
      });

      pm.test('data.updateIsActive is a boolean', function () {
        const json = pm.response.json();
        pm.expect(json.data.updateIsActive).to.be.a('boolean');
      });
