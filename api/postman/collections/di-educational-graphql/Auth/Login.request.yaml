$kind: graphql-request
name: Login
url: '{{baseUrl}}/graphql'
query: |-
  mutation Login($email: String!, $password: String!) {
    login(email: $email, password: $password) {
      access_token
      refresh_token
      user {
        id
        email
        first_name
        last_name
        bio
        avatarUrl
      }
    }
  }
variables: |-
  {
    "email": "user@example.com",
    "password": "password123"
  }
schema:
  source: none
order: 1775093808048
